<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalLoop | Favorites</title>

  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <img class="brand-logo" src="assets/logo.png" alt="LocalLoop logo" />
        LocalLoop
      </a>

      <div class="d-flex gap-2">
        <a class="btn btn-outline-brand" href="index.html">Browse</a>
        <a class="btn btn-outline-brand" href="about.html">About</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <h1 class="mb-1">⭐ Favorites</h1>
    <div class="text-secondary small mb-3">
      Your bookmarked businesses are saved on this device.
    </div>

    <!-- shown only when there are no saved businesses -->
    <div id="emptyState" class="alert alert-secondary d-none">
      No favorites yet. Go back to <a href="index.html">Browse</a> and star a business.
    </div>

    <!-- favorites.js fills this in, grouped by category -->
    <div id="favGrid" class="row g-3"></div>
  </main>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="common.js"></script>
  <script src="favorites.js"></script>
  <script src="auth.js"></script>
</body>

</html>
