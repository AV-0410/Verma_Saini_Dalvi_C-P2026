<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalLoop | Business</title>

  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <img class="brand-logo" src="assets/logo.png" alt="LocalLoop logo" />
        LocalLoop
      </a>

      <div class="d-flex gap-2">
        <a class="btn btn-outline-brand" href="index.html">Browse</a>
        <a class="btn btn-outline-brand" href="favorites.html">⭐ Favorites</a>
        <a class="btn btn-outline-brand" href="about.html">About</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <a href="index.html" class="text-decoration-none">&larr; Back to browse</a>

    <!-- business name, category badge, rating, and favorite button -->
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mt-3">
      <div>
        <h1 id="bizName" class="mb-1"></h1>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <span id="bizCategory" class="badge text-bg-secondary"></span>
          <span id="bizRating" class="text-secondary"></span>
        </div>
      </div>

      <button id="favBtn" class="btn btn-outline-brand">⭐ Favorite</button>
    </div>

    <div class="row g-3 mt-2">

      <!-- left column: info, deal, and reviews -->
      <div class="col-12 col-lg-7">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Business Info</h5>
            <p id="bizDesc" class="mb-2"></p>
            <div class="small text-secondary">
              <div><strong>Address:</strong> <span id="bizAddress"></span></div>
              <div><strong>Phone:</strong> <span id="bizPhone"></span></div>
              <div><strong>Hours:</strong> <span id="bizHours"></span></div>
            </div>
          </div>
        </div>

        <!-- deal card is hidden by default, shown only if the deal is still active -->
        <div id="dealCard" class="card mt-3 shadow-sm d-none">
          <div class="card-body">
            <h5 class="card-title">Deal / Coupon</h5>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <span id="dealTitle" class="badge text-bg-success"></span>
              <span class="coupon-code">Code: <strong id="dealCode"></strong></span>
              <span class="text-secondary small">Expires: <span id="dealExpiry"></span></span>
            </div>
          </div>
        </div>

        <div class="card mt-3 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Reviews</h5>
            <div id="reviewsList" class="vstack gap-2"></div>
            <div id="noReviews" class="text-secondary small d-none mt-2">
              No reviews yet. Be the first!
            </div>
          </div>
        </div>
      </div>

      <!-- right column: review submission form -->
      <div class="col-12 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Leave a Review</h5>

            <div id="formMsg" class="alert d-none" role="alert"></div>

            <label class="form-label mt-2">Rating (1–5)</label>
            <select id="ratingInput" class="form-select">
              <option value="">Choose...</option>
              <option>5</option>
              <option>4</option>
              <option>3</option>
              <option>2</option>
              <option>1</option>
            </select>

            <label class="form-label mt-3">Comment</label>
            <textarea id="commentInput" class="form-control" rows="4"
              placeholder="What was your experience like?"></textarea>

            <!-- math captcha to cut down on spam -->
            <div class="mt-3 p-3 border rounded">
              <div class="small text-secondary mb-2">
                Verification step (anti-bot): answer the question below.
              </div>
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <span id="captchaQuestion" class="badge text-bg-dark"></span>
                <input id="captchaInput" class="form-control w-auto" placeholder="Answer" />
                <button id="newCaptchaBtn" class="btn btn-outline-secondary btn-sm">New</button>
              </div>
            </div>

            <button id="submitReviewBtn" class="btn btn-brand mt-3 w-100">
              Submit Review
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="common.js"></script>
  <script src="business.js"></script>
  <script src="auth.js"></script>
</body>

</html>
