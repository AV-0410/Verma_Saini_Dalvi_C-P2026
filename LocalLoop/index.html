<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalLoop | Discover Local Businesses</title>

  <link rel="stylesheet" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <img class="brand-logo" src="assets/logo.png" alt="LocalLoop logo" />
        LocalLoop
      </a>

      <div class="d-flex gap-2">
        <a class="btn btn-outline-brand" href="favorites.html">⭐ Favorites</a>
        <a class="btn btn-outline-brand" href="about.html">About</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">

    <!-- banner with live stats pulled from localStorage -->
    <section class="browse-hero mb-4">
      <div class="browse-hero-inner">
        <div class="browse-hero-text">
          <div class="browse-hero-eyebrow">🌿 Discover What's Around You</div>
          <h1 class="browse-hero-title">Support Local.<br>Shop Smarter.</h1>
          <p class="browse-hero-sub">Browse top-rated local businesses, grab exclusive deals, and keep your community thriving.</p>
        </div>
        <!-- stat numbers get filled in by the script at the bottom -->
        <div class="browse-hero-stats">
          <div class="browse-stat">
            <div class="browse-stat-num" id="statBusinesses">0</div>
            <div class="browse-stat-label">Local Businesses</div>
          </div>
          <div class="browse-stat-divider"></div>
          <div class="browse-stat">
            <div class="browse-stat-num" id="statDeals">0</div>
            <div class="browse-stat-label">Active Deals</div>
          </div>
          <div class="browse-stat-divider"></div>
          <div class="browse-stat">
            <div class="browse-stat-num" id="statReviews">0</div>
            <div class="browse-stat-label">Community Reviews</div>
          </div>
        </div>
      </div>
    </section>

    <!-- search + filter bar -->
    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
      <input id="searchInput" class="form-control flex-grow-1 minw-240"
        placeholder="Search businesses (name, keywords)..." />

      <select id="categorySelect" class="form-select w-auto">
        <option value="All">All categories</option>
        <option value="Food">Food</option>
        <option value="Retail">Retail</option>
        <option value="Services">Services</option>
        <option value="Health/Fitness">Health/Fitness</option>
      </select>

      <select id="sortSelect" class="form-select w-auto">
        <option value="rating_desc">Sort: Highest Rated</option>
        <option value="reviews_desc">Sort: Most Reviewed</option>
        <option value="az">Sort: A → Z</option>
        <option value="za">Sort: Z → A</option>
      </select>
    </div>

    <div id="statusLine" class="text-secondary small mb-3"></div>

    <!-- business cards go here, rendered by index.js -->
    <div id="businessGrid" class="row g-3"></div>
  </main>

  <script src="data.js"></script>
  <script src="storage.js"></script>
  <script src="common.js"></script>
  <script src="index.js"></script>
  <script>
    // fill in the hero stat numbers from real data
    (function() {
      const businesses = getBusinesses();
      const reviewsMap = getReviewsMap();
      const activeDeals = businesses.filter(b => isDealActive(b.deal)).length;
      const totalReviews = Object.values(reviewsMap).reduce((sum, arr) => sum + arr.length, 0);
      document.getElementById("statBusinesses").textContent = businesses.length;
      document.getElementById("statDeals").textContent = activeDeals;
      document.getElementById("statReviews").textContent = totalReviews;
    })();
  </script>
  <script src="auth.js"></script>
</body>

</html>
